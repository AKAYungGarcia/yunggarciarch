<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="night" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#020806"/>
      <stop offset=".36" stop-color="#06170f"/>
      <stop offset=".72" stop-color="#010302"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx=".5" cy=".24" r=".64">
      <stop offset="0" stop-color="#b8ffd2" stop-opacity=".72"/>
      <stop offset=".24" stop-color="#36ff7f" stop-opacity=".34"/>
      <stop offset=".62" stop-color="#0b3019" stop-opacity=".18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
