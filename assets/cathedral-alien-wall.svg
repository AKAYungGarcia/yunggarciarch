      <feColorMatrix type="matrix" values=".20 0 0 0 .02 0 .25 0 0 .05 0 0 .20 0 .04 0 0 0 .68 0"/>
    </filter>
    <pattern id="ashGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#b8ffd2" stroke-opacity=".045" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1800" height="1800" fill="url(#night)"/>
