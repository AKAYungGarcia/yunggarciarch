      <stop offset=".46" stop-color="#07150c" stop-opacity=".36"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="4" seed="31"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .32"/>
      </feComponentTransfer>
    </filter>
    <filter id="stone">
